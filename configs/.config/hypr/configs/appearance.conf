# ▒█▒█▒█ ▀█▀ █░░█ █░░█ █░░█ █▄█▄█ 　 █░░█ █▀▀ █░░ █░░█ █▄▄▀ █▄▄█ ░░█░░ ▀█▀ █░░█ █░░█ ▀▀█ 
# ▒█▄▀▄█ ▀▀▀ ▀░░▀ ▀▀▀░ ▀▀▀▀ ░▀░▀░ 　 ▀▀▀░ ▀▀▀ ▀▀▀ ▀▀▀▀ ▀░▀▀ ▀░░▀ ░░▀░░ ▀▀▀ ▀▀▀▀ ▀░░▀ ▀▀▀

general {
    gaps_in = 4
    gaps_out = 8

    border_size = 2

    col.active_border = rgb(b4befe) rgb(f5c2e7) 45deg
    col.inactive_border = rgba(585b7088)

    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 14

    dim_special = 0.25

    dim_inactive = true
    dim_strength = 0.04

    blur {
        enabled = true

        size = 4
        passes = 1

        noise = 0.02
        contrast = 1.05
        brightness = 0.95

        xray = false
        new_optimizations = true
    }

    shadow {
        enabled = true

        range = 12
        render_power = 3

        color = rgba(00000030)
    }
}

# █▀▀█ █▀▀▄ ░▀░ █▀▄▀█ █▀▀█ ▀▀█▀▀ ░▀░ █▀▀█ █▀▀▄ █▀▀ 
# █▄▄█ █░░█ ▀█▀ █░▀░█ █▄▄█ ░░█░░ ▀█▀ █░░█ █░░█ ▀▀█ 
# ▀░░▀ ▀░░▀ ▀▀▀ ▀░░░▀ ▀░░▀ ░░▀░░ ▀▀▀ ▀▀▀▀ ▀░░▀ ▀▀▀
# See https://wiki.hyprland.org/Configuring/Animations/

animations {
    enabled = true

    # smooth minimal bezier
    bezier = smooth, 0.25, 1, 0.5, 1

    # windows
    animation = windows, 1, 4, smooth, slide
    animation = windowsOut, 1, 3, smooth, slide
    animation = windowsMove, 1, 4, smooth, slide

    # fade
    animation = fade, 1, 3, smooth

    # workspace
    animation = workspaces, 1, 4, smooth, slidefade
}

