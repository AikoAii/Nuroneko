# ---------------------------------------------------------------------------------------------

# Core Behavior
windowrule = match:class .*, suppress_event maximize
windowrule = match:class ^$, match:title ^$, match:xwayland true, match:float true, no_focus on
windowrule = match:xwayland true, match:float true, no_blur on

# Opacity Rules
windowrule = match:class ^(.*)$, match:title ^(.*)$, opacity 0.90 0.90
windowrule = match:class ^(firefox|zen-browser|chromium|brave-browser|LibreWolf|floorp|vivaldi)$, opacity 1 1
windowrule = match:class ^(Gimp-.*|inkscape|blender|obs|mpv|vlc|celluloid)$, opacity 1 1
windowrule = match:class ^(steam_app_.*|gamescope|Minecraft.*)$, opacity 1 1
windowrule = match:class ^(nemo|org.gnome.FileRoller|file-roller|qt5ct|qt6ct|nwg-look)$, opacity 0.88 0.88
windowrule = match:class ^(kitty|Alacritty|foot|org.wezfurlong.wezterm)$, opacity 0.96 0.96

# Idle Inhibit Rules
windowrule = match:class ^(.*celluloid.*)$|^(.*mpv.*)$|^(.*vlc.*)$|^(.*totem.*)$, idle_inhibit fullscreen
windowrule = match:class ^(.*[Ss]potify.*)$|^(yandex-music)$|^(.*amberol.*)$, idle_inhibit fullscreen
windowrule = match:class ^(zen|firefox|chromium|brave-browser|LibreWolf|floorp|vivaldi|opera)$, idle_inhibit fullscreen
windowrule = match:class ^(steam|steamwebhelper|gamescope|lutris|heroic|retroarch|pcsx2|RPCS3)$, idle_inhibit fullscreen

# Picture-in-Picture
windowrule {
    name = picture_in_picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    float = true
    keep_aspect_ratio = true
    move = (monitor_w*0.745) (monitor_h*0.74)
    size = (monitor_w*0.25) (monitor_h*0.25)
    pin = true
}

# Floating Applications Activation
windowrule = match:class ^(blueman-manager|nm-connection-editor|qt5ct|qt6ct|nwg-look|file-roller|org.gnome.FileRoller|org.kde.ark)$|^(qalculate-qt|gnome-calculator|qalculate-gtk|speedcrunch)$|^(org.pulseaudio.pavucontrol|com.saivert.pwvucontrol|helvum|qjackctl)$|^(btop-popup|fastfetch-popup|yad|zenity|gpartedbin|baobab)$|^(org.gnome.Loupe|imv|feh|eog|vlc)$|^(com.meowrch.HotkeyHub|org.kde.polkit-kde-authentication-agent-1|polkit-gnome-authentication-agent-1)$|^(eartag|audiocutter|puddletag)$|^(nvidia-settings|amdgpu-top|intel-gpu-top)$, float on

# Modals, Dialogs, & Portals
windowrule = match:title ^(Open|Save As|Authentication Required|Choose Files|Open File|Confirm to replace files|File Operation Progress|File Upload|Choose wallpaper|Library|Add Folder to Workspace|Select a directory|Properties)(.*)$, float on
windowrule = match:initial_title ^(Open File|Select Folder|Save File)$, float on
windowrule = match:class ^(.*dialog.*)$|^(.*[Mm]odal.*)$|^(.*[Pp]opup.*)$, float on
windowrule = match:title ^(.*dialog.*)$|^(.*[Mm]odal.*)$|^(.*[Pp]opup.*)$, float on
windowrule = match:class ^(org.freedesktop.impl.portal.desktop.hyprland|org.freedesktop.impl.portal.desktop.gtk|[Xx]dg-desktop-portal-gtk)$, float on
windowrule = match:class ^(xdg-desktop-portal-gtk)$, size 45% 55%

# Scratchpad & Popups Style
windowrule = match:class ^(scratchpad)$, float off
windowrule = match:class ^(scratchpad)$, workspace special:magic
windowrule = match:class ^(btop-popup)$, opacity 0.95 0.95
windowrule = match:class ^(fastfetch-popup)$, no_blur on

# Layer Rules
layerrule = match:namespace ^(rofi|fuzzel|notifications|swaync-notification-window|swaync-control-center|ironbar|avizo)$, blur true
layerrule = match:namespace ^(waybar)$, blur false
layerrule = match:namespace ^(rofi|fuzzel|notifications|swaync-notification-window|swaync-control-center|avizo)$, ignore_alpha 0
