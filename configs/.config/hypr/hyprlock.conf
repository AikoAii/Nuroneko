# ==========================================
# HYPRLOCK - MINIMALIST MODERN DAILY WITH LINE
# ==========================================

background {
    monitor =
    path = ~/.local/share/wallpapers/current
    
    # Standard comfortable blur, not too dark or bright
    blur_passes = 2
    blur_size = 4
    noise = 0.015
    contrast = 0.9
    brightness = 0.8
}

# TIME (Hours & Minutes - Clean, Bold, Readable)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(205, 214, 244, 1.0)               # Catppuccin Text (Clean White)
    font_size = 80
    font_family = JetBrainsMono Nerd Font Bold      # Bold for readability
    position = 0, 110
    halign = center
    valign = center
}

# DATE (Day, Date Month - Casual Format)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgba(166, 173, 200, 1.0)               # Catppuccin Subtext1 (Soft Gray)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 45                               # Positioned below the clock
    halign = center
    valign = center
}

# DECORATIVE LINE (Thin horizontal separator)
label {
    monitor =
    text = |─────────────────────────────────────────────|
    color = rgba(147, 153, 178, 0.3)               # Subtle gray line, not too prominent
    font_size = 10
    position = 0, 5                                # Positioned above the input field
    halign = center
    valign = center
}

# INPUT FIELD (Rounded Transparent Password Box)
input-field {
    monitor =
    size = 260, 42
    outline_thickness = 2
    dots_size = 0.25 
    dots_spacing = 0.3 
    dots_center = true
    
    # Thin blue border, Catppuccin style
    outer_color = rgba(137, 180, 250, 0.6)         # Semi-transparent blue (60%)
    inner_color = rgba(30, 30, 46, 0.6)            # Transparent Catppuccin dark
    font_color = rgba(205, 214, 244, 1.0)
    
    fade_on_empty = false 
    
    placeholder_text = <span foreground="##a6adc8">Enter Password...</span>
    hide_input = false
    
    position = 0, -60
    halign = center
    valign = center
}
